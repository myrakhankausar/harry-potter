<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        margin: 0%;
        padding: 0%;
        box-sizing: border-box;
    }
    .top{
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 890px;
    }
    select{
        width: 150px;
        height: 30px;
    }
    .boxes{
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 20px;
        margin-left: 55px;
    }
</style>
<body>
    <div class="top">
    <h1>Harry Potter</h1>
    <select>
        <option value="select">Select House</option>
        <option value="gryffindor">Gryffindor</option>
        <option value="slytherin">Slytherin</option>
        <option value="ravenclaw">Ravenclaw</option>
        <option value="hufflepuff">Hufflepuff</option>
    </select>
    </div>
    <div class="boxes">
        <div class="card"></div>
    </div>
    
</body>
<script>
    const URL = `https://hp-api.onrender.com/api/characters`;
    const boxes = document.querySelector(".boxes");
    const select = document.querySelector("select");

select.addEventListener("change", async function () {
    const promise = await fetch(URL);
    const data = await promise.json();
    boxes.innerHTML = ""; 

    const value = select.value.toLowerCase();
    const filtered = data.filter((character) =>
        character.house.toLowerCase().includes(value)
    );

    if (filtered.length > 0) {
        for (let i = 0; i < filtered.length; i++) {
            const div = document.createElement("div");
            div.style = `
                background-color: rgb(102, 135, 164);
                width: 155px;
                display: grid;
                padding: 10px;
                gap: 5px;
            `;
            div.innerHTML = `
                <img src="${filtered[i].image}" alt="UNKNOWN" width="150" >
                <h3>${filtered[i].actor}</h3>
                <span>Gender: ${filtered[i].gender}</span>
                <span>House: ${filtered[i].house}</span>
                <span>Date Of Birth: ${filtered[i].yearOfBirth || "Unknown"}</span>
            `;
            boxes.appendChild(div);
        }
    }
});
</script>
</html>
